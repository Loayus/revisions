Q17:
  title: "Quelles affirmations sont exactes ?"
  options:
    - "Selon Schurr, les sportifs pratiquant un sport collectif sont plus anxieux plus extravertis que les sportifs pratiquant un sport individuel."
    - "Selon Allen 2011, les sportifs pratiquant un sport à haut risque sont très névrotiques et extravertis."
    - "Garland et Barry (1990) ont mis en évidence que chez les joueurs de football américain, il existe le niveau appelé « les coupeurs de citron » (ceux qui ne jouent quasiment jamais lors des matchs à enjeu élevés)."
    - "La personnalité, la motivation, l'anxiété, et diverses autres dimensions psychologiques permettent d'expliquer près de 20% à 45% de la variabilité dans la performance athlétique (Morgan, 1980)."
    - "Selon Aidman, à potentiel physique identique au niveau junior, les joueurs qui avaient le plus de chances d'évoluer dans la ligue professionnelle de football australien 7 ans plus tard, étaient ceux qui présentaient entre autres, un score plus élevé sur le trait « caractère consciencieux/ conformisme ». C'est-à-dire, ils étaient plus conformistes, scrupuleux, et qui respectaient davantage les conventions."
Q18:
  title: "À propos de la personnalité particulière du sportif :"
  options:
    - "Selon l'hypothèse gravitationnelle, les individus seraient attirés par les sports qui correspondraient à leurs traits de personnalité."
    - "Les individus qui ont une personnalité déterminée, affirmée, qui sont sûrs d'eux-mêmes, et qui ont un trait d'agressivité marqué, pourraient « graviter » autour des sports comme le rugby, la boxe ou le hockey selon l'hypothèse des attentes sociales."
    - "Seules les personnes qui ont les caractéristiques de personnalité les mieux adaptées au sport qu'elles pratiquent, continuent de faire ce sport et que celles qui n'ont pas ces caractéristiques, arrêtent selon l'hypothèse gravitationnelle."
    - "La compétition sportive pourrait avoir un effet négatif sur l'apparition de comportements pro-sociaux dans la mesure où les enfants qui ont la plus grande expérience dans les sports compétitifs, sont significativement moins altruistes et généreux envers leurs camarades que ceux qui ont moins d'expérience dans le sport, selon l'hypothèse des attentes sociales."
    - "Selon l'hypothèse gravitationnelle, on peut penser que la pratique régulière d'un sport constitue une expérience qui contribue à façonner la personnalité des individus. Le sport en général et les différents sports en particulier constituent des lieux de socialisation, dans le sens où ils véhiculent certaines valeurs, certaines attentes qui peuvent être intériorisées et marquer la personnalité des pratiquants."
