Q4:
  title: "A propos des commotions liées au sport :"
  options:
    - "Il s'agit d'un changement temporaire de la fonction cérébrale après un traumatisme crânien, sans aucun signe de lésion cérébrale visible sur les examens d'imagerie tels que la tomodensitométrie (TDM) ou l'imagerie par résonance magnétique (IRM)."
    - "Environ 3% de ceux ayant présenté des commotions multiples (même apparemment mineures) développent une encéphalopathie traumatique chronique."
    - "Dans le trauma chronique, les patients ont des anomalies neurodégénératives structurelles, dont une atrophie corticale, assez semblable à celle de la maladie d'Alzheimer."
    - "Le syndrome du second choc est une complication rare mais grave de la commotion cérébrale."
    - "La mortalité du second choc est proche de 70%."
