  title: "Quelle(s) affirmation(s) est /ou sont fausse(s) ?"
  options:
    - "Selon Hickey (2008), les filles préfèreraient alors renoncer à leurs buts par crainte d'être rejetées en ne témoignant pas d'attitudes ou de qualités assez féminines."
    - "Le plaisir est défini comme un ressenti positif, pendant ou à la fin de l'action résultant d'une combinaison complexe entre émotions, affects, humeurs et expériences antérieures (Haye et al, 2001)."
    - "Selon Gagnaire et Lavie (2010), dans l'APSA escalade, il peut être intéressant d'inscrire les élèves dans des situations différentes au regard de leur profil émotionnel initial. Les élèves orientés vers l'épreuve, pourront par exemple avoir pour objectif de monter la hauteur de la tour Eiffel en une leçon (324m)."
    - "Du collège au lycée, l'EPS apparaît ainsi comme une discipline plus « masculinisée » que les autres, avec 56 % d'hommes parmi ses personnels enseignants dans le secteur public, un chiffre qui monte à 61 % dans le secteur privé."
    - "D'après COSTON (2017), pour les lycéennes et les lycéens interrogés, le sexe aurait finalement peu d'importance face à la compétence à enseigner : « Le sexe n'a pas d'importance pour un professeur idéal, le mieux c'est qu'il aime être prof »"
