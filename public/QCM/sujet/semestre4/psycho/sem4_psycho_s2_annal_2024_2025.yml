Q1:
  title: "Quelle(s) affirmations(s) est/sont exacte(s) au sujet du trauma crânien (TC) d'après Kosakevitch-Ricbourg, (2006) ?"
  options:
    - "La perte ou non de la connaissance."
    - "Le score de coma de Glashow."
    - "La présence ou non de lésion intracrânienne au scanner cérébral"
    - "Le trauma modéré se traduit par une perte de connaissance inférieure à 30 minutes, d'une absence de lésion sur le scanner cérébral, d'un score sur l'échelle d'altération de conscience entre 13 et 15 et d'une amnésie post traumatique inférieur à 24 heures."
    - "Le TC grave se caractérise par une perte de connaissance prolongée (à partir d'une heure pouvant aller au-delà de 24 heures), l'apparition de lésion dite sévère (lésion cérébelleuse comprise entre 30 et 50 millilitres) sur le scanner cérébral, d'un score sur l'échelle d'altération de conscience inférieur à 9 et d'une amnésie post traumatique supérieure à 24 heures."
