Q9:
  title: "À propos de l'activité physique :"
  options:
    - "BERNIER montre que les activités d'endurance comme pratiquer trente minutes de vélo par jour favorise une augmentation des neurotransmetteurs et des facteurs de croissance neuronale ce qui favorise une amélioration de l'activation neuronale."
    - "Northey (2018) montre que sur le plus long terme, l'exercice physique génère une augmentation de la neurogénèse (augmentation de la formation de réseaux de neurones) et de l'angiogenèse (augmentation de la formation de nouveaux vaisseaux sanguins) lorsqu'un individu effectue une tâche cognitive ce qui favorise son efficacité."
    - "WON (2019) montre qu'une intensité modérée doit être prescrite pour espérer observer une amélioration des fonctions intentionnelles grâce à l'AP. Cette intensité permet d'améliorer l'activité noradrénergique qui affecte les fonctions attentionnelles avec un effet plus important sur l'attention soutenue ainsi qu'une activation plus efficace du cortex préfrontal."
    - "Selon Fritz (2015), des situations d'AP mettant en jeu des exercices de double tâche permettent de participer à la restauration des fonctions cérébrales impliquées dans l'attention et la motricité en améliorant la mobilité générale ainsi que l'équilibre et la marche pour les patients moins atteints."
    - "L'amélioration de ces performances cognitives repose en partie sur la plasticité cérébrale et sur la capacité du cerveau à se réorganiser en dépit de la dégradation des performances du système nerveux qui est un phénomène inévitable du vieillissement dont est victime le corps humain (Radel, 2018)."
Q10:
  title: "Le parcours d'orientation (PO) quelles affirmations sont exactes ?"
  options:
    - "Est une dérivée de la course d'orientation."
    - "Le but principal est de stimuler le patient d'un point de vue physique à travers les déplacements entre les balises et d'un point de vue cognitif en leur proposant des petits exercices inscrits sur les balises (double tâche)."
    - "Le PO est une activité physique qui sollicite les fonctions cognitives, en particulier les fonctions attentionnelles, la mémoire, la perception et la capacité d'orientation tout en mettant en jeu la motricité. Elle permet en plus de développer les capacités d'analyse de l'environnement (savoir ou je suis) et de mise en place de stratégie (adapter ses déplacements)."
    - "Les déplacements entre les balises permettent de solliciter la fonction cardiaque, de stimuler les fonctions cognitives et d'améliorer l'oxygénation cérébrale et les capacités de raisonnement à condition que le pratiquant se déplace à une intensité suffisamment importante équivalente à 80% de sa fréquence cardiaque maximale (environ 134 battements par minute pour un individu de 45 ans)."
    - "Cette activité fait appel non seulement, aux capacités d'orientation et de déplacement dans l'espace en fonction du plan mais également aux capacités mnésiques (retenir ce que l'on a vu sur le plan pour éviter de le consulter sans cesse) et aux facultés de compréhension quant au fonctionnement et déroulement de la séance."
Q11:
  title: "Quelles affirmations sont exactes ?"
  options:
    - "L'impulsivité est considérée comme la tendance à exprimer des comportements spontanés, excessifs et/ou non planifiés, joue un rôle essentiel dans la compréhension de nombreux états psychopathologiques et comportements problématiques."
    - "L'impulsivité est un construit unidimensionnel."
    - "Les amateurs de sensations, dans un état de non-stimulation, auraient une activité sérotonique faible et rechercheraient des substances ou comportements qui relèveraient cette activité."
    - "L'augmentation de l'activation cérébrale provoque une augmentation de l'efficience comportementale mais jusqu'à un certain seuil."
    - "La personnalité selon Cottraux est « un ensemble de patrons de comportement, déterminés par l'hérédité et le milieu, se développant par l'interaction de quatre secteurs dans lesquels ces patrons sont organisés : le cognitif, le volitionnel, l'affectif et le somatique »."
